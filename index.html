<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R1等级升级计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .wallet-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        @media (max-width: 600px) {
            .wallet-inputs {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        input[type="number"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s;
            text-align: center;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .target-info {
            background: linear-gradient(135deg, #f0f4ff 0%, #e8eeff 100%);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 25px;
            border: 2px solid #667eea;
        }

        .target-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .target-value {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
        }

        .target-sub {
            font-size: 13px;
            color: #999;
            margin-top: 5px;
        }

        .results-section {
            display: none;
        }

        .results-section.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        @media (max-width: 500px) {
            .stats {
                grid-template-columns: 1fr;
            }
        }

        .stat-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #333;
        }

        .stat-value.highlight {
            color: #667eea;
        }

        .language-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .lang-tab {
            padding: 10px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #999;
            position: relative;
            transition: all 0.3s;
            border-radius: 8px;
        }

        .lang-tab:hover {
            background: #f0f4ff;
        }

        .lang-tab.active {
            color: #667eea;
            background: #f0f4ff;
        }

        .lang-tab.active::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 20%;
            right: 20%;
            height: 3px;
            background: #667eea;
            border-radius: 2px;
        }

        .copy-inline-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            margin-left: auto;
        }

        .copy-inline-btn:hover {
            background: #5568d3;
            transform: translateY(-1px);
        }

        .copy-inline-btn.copied {
            background: #4caf50;
        }

        .template-box {
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f4ff 100%);
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 15px;
            line-height: 1.8;
            font-size: 16px;
            color: #333;
            white-space: pre-wrap;
            min-height: 180px;
        }

        .lang-content {
            display: none;
        }

        .lang-content.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        .auto-hint {
            text-align: center;
            color: #999;
            font-size: 13px;
            margin-top: 10px;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 R1等级升级计算器</h1>
            <p>输入钱包余额，自动生成话术</p>
        </div>

        <div class="content">
            <div class="wallet-inputs">
                <div class="form-group">
                    <label>💰 储蓄钱包余额 (RM)</label>
                    <input type="number" id="savingsBalance" placeholder="0" min="0" oninput="autoCalculate()">
                </div>
                <div class="form-group">
                    <label>💳 灵活钱包余额 (RM)</label>
                    <input type="number" id="flexibleBalance" placeholder="0" min="0" oninput="autoCalculate()">
                </div>
            </div>

            <div class="target-info">
                <div class="target-label">🎯 目标等级</div>
                <div class="target-value">R1 / RM150</div>
                <div class="target-sub">升级后每日收入 RM5</div>
            </div>

            <div class="auto-hint">💡 输入金额后自动生成话术</div>

            <div class="results-section" id="results">
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-label">储蓄钱包</div>
                        <div class="stat-value" id="statSavings">RM0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">灵活钱包</div>
                        <div class="stat-value" id="statFlexible">RM0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">需补足</div>
                        <div class="stat-value highlight" id="statGap">RM0</div>
                    </div>
                </div>

                <div class="language-tabs">
                    <button class="lang-tab active" onclick="switchLang('zh')">🇨🇳 中文</button>
                    <button class="lang-tab" onclick="switchLang('en')">🇬🇧 English</button>
                    <button class="lang-tab" onclick="switchLang('ms')">🇲🇾 Melayu</button>
                    <button class="copy-inline-btn" id="copyBtn" onclick="copyCurrentText()">
                        <span>📋</span> 复制话术
                    </button>
                </div>

                <div id="content-zh" class="lang-content active">
                    <div class="template-box" id="template-zh"></div>
                </div>

                <div id="content-en" class="lang-content">
                    <div class="template-box" id="template-en"></div>
                </div>

                <div id="content-ms" class="lang-content">
                    <div class="template-box" id="template-ms"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const R1_AMOUNT = 150;
        const DAILY_INCOME = 5;
        let currentLang = 'zh';

        function autoCalculate() {
            const savings = parseFloat(document.getElementById('savingsBalance').value) || 0;
            const flexible = parseFloat(document.getElementById('flexibleBalance').value) || 0;

            const totalBalance = savings + flexible;
            const gap = Math.max(0, R1_AMOUNT - totalBalance);

            // 更新统计显示
            document.getElementById('statSavings').textContent = 'RM' + savings;
            document.getElementById('statFlexible').textContent = 'RM' + flexible;
            document.getElementById('statGap').textContent = 'RM' + gap;

            // 生成话术
            generateTemplates(savings, flexible, gap);

            // 显示结果区域
            const resultsSection = document.getElementById('results');
            if (savings > 0 || flexible > 0) {
                resultsSection.classList.add('show');
            } else {
                resultsSection.classList.remove('show');
            }
        }

        function generateTemplates(savings, flexible, gap) {
            // 中文话术 - 已更新为最后一天提醒
            const zhTemplate = `你的储蓄钱包目前有${savings}马币，灵活钱包里有${flexible}马币。现在只需再补${gap}马币，就能升级到R1。升级后，你每天可获得${DAILY_INCOME}马币的收入。

今天是补差额最后一天。明天起统一升级费用为 RM150，现金代码将失效。

今天升级还能额外获得一个现金代码！你想现在就升级到R1吗？`;

            // English - Updated to last day reminder
            const enTemplate = `Your savings wallet currently has RM${savings}, and your flexible wallet has RM${flexible}. You only need to top up RM${gap} more to upgrade to R1. After upgrading, you will earn RM${DAILY_INCOME} daily income.

Today is the last day to make up the difference. Starting tomorrow, the upgrade fee will be uniformly RM150, and the cash code will expire.

Upgrade today and receive an extra cash code! Would you like to upgrade to R1 now?`;

            // Malay - Updated to last day reminder
            const msTemplate = `Dompet simpanan anda kini mempunyai RM${savings}, dan dompet fleksibel anda mempunyai RM${flexible}. Anda hanya perlu tambah RM${gap} lagi untuk menaik taraf ke R1. Selepas menaik taraf, anda akan memperoleh pendapatan harian RM${DAILY_INCOME}.

Hari ini adalah hari terakhir untuk menambah kekurangan. Bermula esok, yuran menaik taraf akan seragam RM150, dan kod tunai akan tamat tempoh.

Naik taraf hari ini dan dapatkan kod tunai tambahan! Adakah anda mahu menaik taraf ke R1 sekarang?`;

            document.getElementById('template-zh').textContent = zhTemplate;
            document.getElementById('template-en').textContent = enTemplate;
            document.getElementById('template-ms').textContent = msTemplate;
        }

        function switchLang(lang) {
            currentLang = lang;

            document.querySelectorAll('.lang-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');

            document.querySelectorAll('.lang-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById('content-' + lang).classList.add('active');
        }

        function copyCurrentText() {
            const text = document.getElementById('template-' + currentLang).textContent;

            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();

            try {
                document.execCommand('copy');
                const btn = document.getElementById('copyBtn');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<span>✅</span> 已复制!';
                btn.classList.add('copied');

                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            } catch (err) {
                alert('复制失败，请手动复制');
            }

            document.body.removeChild(textarea);
        }
    </script>
</body>
</html>
